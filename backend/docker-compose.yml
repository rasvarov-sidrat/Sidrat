services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://sidrat:sidrat@postgres:5432/sidrat
      READ_DATABASE_URL: postgresql+asyncpg://sidrat:sidrat@postgres:5432/sidrat
      REDIS_URL: redis://redis:6379/0
      BOOTSTRAP_DATABASE: "false"
      SEED_DEMO_DATA: "false"
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sidrat
      POSTGRES_USER: sidrat
      POSTGRES_PASSWORD: sidrat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sidrat -d sidrat"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
