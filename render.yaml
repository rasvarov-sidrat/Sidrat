databases:
  - name: sidrat-db
    databaseName: sidrat
    user: sidrat
    plan: free

services:
  - type: web
    name: sidrat-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    envVars:
      - key: APP_ENV
        value: production
      - key: BOOTSTRAP_DATABASE
        value: "false"
      - key: SEED_DEMO_DATA
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: sidrat-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://sidrat-phi.vercel.app,http://localhost:5173,http://127.0.0.1:5173
      - key: SECRET_KEY
        generateValue: true
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: MAIL_FROM_NAME
        value: SIDRAT
      - key: SMTP_USE_STARTTLS
        value: "true"
      - key: SMTP_USE_SSL
        value: "false"
